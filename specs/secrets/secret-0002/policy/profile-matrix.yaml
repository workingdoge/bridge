schema_version: secret-0002-0.1
recommended_profile_matrix:
  database-credential:
  - backend: backend.vault-dynamic-db
    materializer: materializer.systemd-credential
    reason: issue-on-demand database lease to a tightly scoped service
  - backend: backend.kms-envelope-shared
    materializer: materializer.systemd-credential
    reason: static bootstrap or fallback when dynamic issuance is unavailable
  dynamic-credential-template:
  - backend: backend.vault-dynamic-db
    materializer: materializer.systemd-credential
    reason: dynamic lease plus bounded service delivery
  signing-key:
  - backend: backend.hsm-rooted-signing
    materializer: materializer.unix-socket-proxy
    reason: non-exportable signing via proxy
  - backend: backend.hsm-rooted-signing
    materializer: materializer.agent-proxy
    reason: local broker mediates operations without handing out key material
  wrapping-key:
  - backend: backend.hsm-rooted-signing
    materializer: materializer.unix-socket-proxy
    reason: proxy-only unwrap/wrap operations
  bootstrap-secret:
  - backend: backend.kms-envelope-shared
    materializer: materializer.systemd-credential
    reason: NixOS/Linux bootstrap to a service
  - backend: backend.macos-keychain-bootstrap
    materializer: materializer.os-keychain-ref
    reason: local workstation bootstrap only
  api-token:
  - backend: backend.kms-envelope-shared
    materializer: materializer.systemd-credential
    reason: bounded Linux service delivery
  - backend: backend.macos-keychain-bootstrap
    materializer: materializer.agent-proxy
    reason: local workstation use through a broker rather than raw export
