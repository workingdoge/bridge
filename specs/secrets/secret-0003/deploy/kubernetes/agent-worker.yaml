apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-worker
  template:
    metadata:
      labels:
        app: agent-worker
    spec:
      serviceAccountName: agent-worker
      containers:
        - name: bridge-sidecar
          image: ghcr.io/example/bridge-sidecar:latest
          args:
            - --catalog=/etc/bridge/provider-catalog.json
            - --deployment=/etc/bridge/deployment-profile.json
          volumeMounts:
            - name: bridge-config
              mountPath: /etc/bridge
              readOnly: true
            - name: bridge-runtime
              mountPath: /run/bridge
            - name: memory-tmp
              mountPath: /run/secrets-memory
        - name: agent
          image: ghcr.io/example/agent-worker:latest
          env:
            - name: BRIDGE_SOCKET
              value: unix:///run/bridge/bridge.sock
          volumeMounts:
            - name: bridge-runtime
              mountPath: /run/bridge
            - name: memory-tmp
              mountPath: /run/secrets-memory
      volumes:
        - name: bridge-config
          configMap:
            name: bridge-config
        - name: bridge-runtime
          emptyDir: {}
        - name: memory-tmp
          emptyDir:
            medium: Memory
