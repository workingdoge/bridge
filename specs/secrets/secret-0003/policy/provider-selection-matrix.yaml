version: '0.1'
profiles:
- environment_type: workstation-local
  defaults:
    identity_mode: hybrid
    backend_classes:
    - os-keychain-bootstrap
    - vault-dynamic
    - external-reference
    materializer_classes:
    - agent-proxy
    - memfd-pass
    - os-keychain-ref
    audit_policy: primary sink + optional sealed queue
- environment_type: nixos-service-host
  defaults:
    identity_mode: workload
    backend_classes:
    - vault-dynamic
    - kms-envelope
    - external-reference
    materializer_classes:
    - systemd-credential
    - unix-socket-proxy
    - tmpfs-file
    audit_policy: primary sink required
- environment_type: cloud-agent-worker
  defaults:
    identity_mode: workload
    backend_classes:
    - vault-dynamic
    - kms-envelope
    - external-reference
    materializer_classes:
    - agent-proxy
    - unix-socket-proxy
    - memfd-pass
    - cloud-kms-decrypt
    audit_policy: primary sink required; no local persistence
- environment_type: ci-runner
  defaults:
    identity_mode: workload
    backend_classes:
    - vault-dynamic
    - kms-envelope
    materializer_classes:
    - agent-proxy
    - memfd-pass
    - tmpfs-file
    audit_policy: primary sink required; job scoped
