openapi: 3.1.0
info:
  title: Secret Provider Sidecar API
  version: "0.1"
  summary: Authoritative provider integration API for SECRET-0003.
servers:
  - url: https://bridge-sidecar.local
paths:
  /v1/providers/catalog:
    get:
      summary: Read the active provider catalog
      operationId: getProviderCatalog
      responses:
        '200':
          description: Active provider catalog
          content:
            application/json:
              schema:
                $ref: ../schemas/provider-catalog.schema.json
  /v1/deployments/{deploymentProfileId}:
    get:
      summary: Read a deployment profile
      operationId: getDeploymentProfile
      parameters:
        - in: path
          name: deploymentProfileId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deployment profile
          content:
            application/json:
              schema:
                $ref: ../schemas/deployment-profile.schema.json
  /v1/providers/time/now:
    get:
      summary: Fetch authoritative current time
      operationId: getAuthoritativeTime
      responses:
        '200':
          description: Authoritative time snapshot
          content:
            application/json:
              schema:
                type: object
                required: [now, source_id]
                properties:
                  now:
                    type: string
                    format: date-time
                  source_id:
                    type: string
  /v1/providers/mode/current:
    get:
      summary: Read current mode state
      operationId: getModeState
      responses:
        '200':
          description: Mode state
          content:
            application/json:
              schema:
                $ref: ../schemas/mode-state.schema.json
  /v1/providers/revocation/snapshot:
    get:
      summary: Read current revocation snapshot
      operationId: getRevocationSnapshot
      responses:
        '200':
          description: Revocation snapshot
          content:
            application/json:
              schema:
                $ref: ../schemas/revocation-snapshot.schema.json
  /v1/providers/attestation/verify:
    post:
      summary: Verify attestation for a subject
      operationId: verifyAttestation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subject_id]
              properties:
                subject_id:
                  type: string
      responses:
        '200':
          description: Attestation result
          content:
            application/json:
              schema:
                $ref: ../schemas/attestation-result.schema.json
  /v1/authorize/providers:
    post:
      summary: Evaluate provider readiness and deployment binding for a secret request
      operationId: authorizeProviderPath
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ../schemas/provider-request.schema.json
      responses:
        '200':
          description: Provider decision
          content:
            application/json:
              schema:
                $ref: ../schemas/provider-decision.schema.json
        '409':
          description: Burn-mode decision
        '503':
          description: Required provider unavailable
  /v1/providers/audit/emit:
    post:
      summary: Emit an audit envelope
      operationId: emitAuditEnvelope
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ../schemas/audit-envelope.schema.json
      responses:
        '202':
          description: Accepted for durable persistence
  /v1/providers/audit/checkpoint:
    get:
      summary: Read the latest audit checkpoint
      operationId: getAuditCheckpoint
      responses:
        '200':
          description: Latest checkpoint
          content:
            application/json:
              schema:
                $ref: ../schemas/audit-checkpoint.schema.json
