spec_id: SECRET-0001
version: '0.1'
title: Secret Version Lifecycle State Machine
states:
  staged:
    runtime_materialization: deny
    description: Generated, imported, derived, or restored but not yet usable.
  active:
    runtime_materialization: allow
    description: Usable for ordinary runtime materialization.
  suspended:
    runtime_materialization: deny
    description: Temporarily blocked from ordinary runtime use.
  revoked:
    runtime_materialization: deny
    description: Permanently blocked for future runtime use.
  retired:
    runtime_materialization: deny
    description: Superseded by a newer version.
  archived:
    runtime_materialization: deny
    description: Off the hot path; retained only for controlled recovery or evidence.
  destroyed:
    runtime_materialization: deny
    terminal: true
    description: Terminal state for ordinary runtime use.
transitions:
- from: null
  to: staged
  event: generate
  guards:
  - authorized_generate_or_import
- from: null
  to: staged
  event: import
  guards:
  - authorized_generate_or_import
- from: null
  to: staged
  event: derive
  guards:
  - authorized_generate_or_import
- from: null
  to: staged
  event: restore
  guards:
  - recovery_policy_allows_restore
  - restore_enters_staged
- from: staged
  to: active
  event: activate
  guards:
  - activation_requirements_met
  - cryptoperiod_valid
- from: active
  to: suspended
  event: suspend
  guards:
  - authorized_suspend
- from: suspended
  to: active
  event: unsuspend
  guards:
  - authorized_unsuspend
  - revocation_not_set
- from: active
  to: revoked
  event: revoke
  guards:
  - authorized_revoke
- from: suspended
  to: revoked
  event: revoke
  guards:
  - authorized_revoke
- from: active
  to: retired
  event: retire
  guards:
  - replacement_exists_or_policy_allows
- from: suspended
  to: retired
  event: retire
  guards:
  - replacement_exists_or_policy_allows
- from: revoked
  to: archived
  event: archive
  guards:
  - retention_policy_allows
- from: retired
  to: archived
  event: archive
  guards:
  - retention_policy_allows
- from: archived
  to: staged
  event: restore
  guards:
  - recovery_policy_allows_restore
  - fresh_epoch_required
- from: retired
  to: destroyed
  event: destroy
  guards:
  - authorized_destroy
  - destruction_recorded
- from: revoked
  to: destroyed
  event: destroy
  guards:
  - authorized_destroy
  - destruction_recorded
- from: archived
  to: destroyed
  event: destroy
  guards:
  - authorized_destroy
  - destruction_recorded
derived_events:
  rotate:
    sequence:
    - generate new staged version
    - activate new version
    - retire or revoke previous active version after overlap window
  rewrap:
    sequence:
    - maintain same logical state
    - update protection metadata
    - record event and evidence
  burn:
    effect:
    - deny all new materializations
    - invalidate grants by bridge epoch
    - preserve evidence and control channels
invariants:
- Only active versions may be used for ordinary runtime materialization.
- Destroyed is terminal.
- Revoked, retired, archived, suspended, and staged versions deny ordinary runtime
  materialization.
- Restore never returns directly to active.
- Revocation and burn invalidate outstanding grants by epoch or equivalent freshness
  check.
