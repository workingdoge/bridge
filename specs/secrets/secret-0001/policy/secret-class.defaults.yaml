version: secret-0001-0.1
classes:
  database-credential:
    rotation_mode: on-demand
    max_active_age_s: 86400
    max_overlap_s: 300
    revocation_sla_s: 60
    allowed_methods:
    - agent-proxy
    - unix-socket
    - fd-pass
    max_ttl_s: 900
    recoverable: false
    backup_required: false
  dynamic-credential-template:
    rotation_mode: derived-per-use
    max_active_age_s: 31536000
    max_overlap_s: 0
    revocation_sla_s: 60
    allowed_methods:
    - agent-proxy
    - cloud-kms-decrypt
    max_ttl_s: 900
    recoverable: false
    backup_required: false
  signing-key:
    rotation_mode: scheduled
    max_active_age_s: 7776000
    max_overlap_s: 86400
    revocation_sla_s: 300
    allowed_methods:
    - cloud-kms-decrypt
    - agent-proxy
    max_ttl_s: 3600
    recoverable: true
    backup_required: true
  wrapping-key:
    rotation_mode: manual
    max_active_age_s: 31536000
    max_overlap_s: 86400
    revocation_sla_s: 60
    allowed_methods:
    - cloud-kms-decrypt
    - agent-proxy
    max_ttl_s: 600
    recoverable: true
    backup_required: true
    escrow_mode: quorum-shares
    restore_approval_mode: dual
  recovery-share:
    rotation_mode: manual
    max_active_age_s: 31536000
    max_overlap_s: 0
    revocation_sla_s: 60
    allowed_methods:
    - os-keychain-ref
    max_ttl_s: 600
    recoverable: true
    backup_required: true
    escrow_mode: split-knowledge
    restore_approval_mode: dual
  bootstrap-secret:
    rotation_mode: manual
    max_active_age_s: 15552000
    max_overlap_s: 3600
    revocation_sla_s: 300
    allowed_methods:
    - tmpfs-file
    - fd-pass
    - memfd
    max_ttl_s: 1800
    recoverable: true
    backup_required: true
global_defaults:
  env_var_disabled_by_default: true
  destroy_on_consumer_exit: true
  reentry_to_model_prohibited: true
  log_export_prohibited: true
  restore_enters_state: staged
  plaintext_metadata_prohibited: true
